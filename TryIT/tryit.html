<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try it editor</title>
</head>
<script src="jsLib/utils.js"></script>
<script src="jsLib/boucle.js"></script>

<style>
/* presentation */
body {margin:0;}
.b { border:1px solid black;}
.p3 { padding:3px;}
.m3 { margin:3px;}
#banniere { height:30px; line-height:30px; vertical-align:middle;text-align:center;}
#version {float:left;}
#imgLoad {visibility:hidden;}
#edition { position:absolute;top:43px;bottom:3px;left:3px;right:50.2%;}

#visuel { 
    position:absolute;top:43px;bottom:3px;right:3px;left:50.2%;
    white-space: pre-wrap; /* CORRECTION : Permet de voir les retours à la ligne ! */
}

#saisie {
    width:100%;height:100%; 
    resize:none;
    border:none;
    outline:none;
}

#popup {
    color:white;
    background-color:black;
    border-radius:3px;
    padding:5px;
    position:absolute;
    top:30px;left:100px;
    z-index:10;
    display:none;
}
</style>

<script>
// Déclarations des variables globales
var refTASaisie; 
var refVisuel; 
var refCbAuto;
var refPopup; 
var oParams; //  CORRECTION : Déclaré ici pour être accessible en toute sécurité partout

function init() {
    trace("init");
    refTASaisie = document.getElementById("saisie");
    refVisuel = document.getElementById("visuel");
    refCbAuto = document.getElementById("cbAuto");
    refPopup = document.getElementById("popup");
    
    oParams = {
        periode: 2,
        traiter : actualiser, 
        testerPoursuite: function (){
            trace("actu auto");
            if (document.hidden) {
                trace("Page masquée : pause de la boucle.");
                return false; 
            }
            return refCbAuto.checked;
        }
    };
    
    if (refCbAuto.checked) boucle(oParams);
}

function actualiser() {
    trace("actualiser");
    var contenu = refTASaisie.value;
    trace("contenu : " + contenu); 
    refVisuel.innerHTML = contenu;
}

function decocherCbAuto(contexte) {
    trace("decocherCbAuto "); 
    if (contexte.code == "Escape") {
        refCbAuto.checked = false;
    }
}

function popin(contexte) {
    var msg =""; 
    refPopup.style.left  = (parseInt(contexte.clientX) + 5) + "px";
    refPopup.style.top  = (parseInt(contexte.clientY) + 10) + "px";
    
    switch(contexte.target.id) {
        case "btnActu" : msg = "cliquer pour actualiser"; break; 
        case "cbAuto" : msg = "cocher pour actualiser automatiquement"; break; 
        case "lblAuto" : msg = "cliquer pour cocher"; break; 
    }
    if (msg != "") {
        refPopup.innerHTML = msg;
        refPopup.style.display = "block";
        window.setTimeout(function(){
            refPopup.style.display = "none";
        },2000);
    }
}

function popout() {
    refPopup.style.display = "none";
}

// Gestionnaire du changement d'onglet/application
document.addEventListener("visibilitychange", function() {
    // On ne relance que si oParams existe déjà pour éviter les crashs au chargement
    if (oParams && !document.hidden && refCbAuto.checked) {
        trace("Retour sur la page : relance de la boucle.");
        boucle(oParams);
    }
});
</script>

<body onload="init();" onkeydown="decocherCbAuto(event);" >

<div id="popup">message</div>

<div id="banniere" class="b p3 m3" onmouseover="popin(event);" onmouseout="popout();">
    <span id="version">Version 1</span>
    <input id="btnActu" type="button" value="Actualiser" onclick="actualiser();"  />
    <input id="cbAuto" type="checkbox" onclick="if(this.checked){ boucle(oParams); } actualiser();"/> 
    <label id="lblAuto" for="cbAuto">automatiquement</label>
</div>

<div id="edition" class="b p3">
    <textarea id="saisie">saisie </textarea>
</div>

<div id="visuel" class="b p3"> affichage </div>

</body>
</html>
