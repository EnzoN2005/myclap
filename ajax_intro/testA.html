<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test A</title>
</head>
<script>
    function chargerdoc(){
        var xhttp= new XMLHttpRequest();
        xhttp.onload= function (){
            document.getElementById("zoneTxt").innerHTML= this.responseText;
        }
        xhttp.open("GET", "ajax_txt.txt", true);
        xhttp.send();
    }   
</script>

<body>
    <div id="zoneTxt">
        <button type="button" onclick="chargerdoc();">Cliquer pour tester</button>
    </div>
</body>
</html>
