<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<script type="text/javascript" src="js/jquery-4.0.0.min.js"></script>
<style>
#contenu {
	border: 1px solid black;
	padding:0 3px;
	margin:3px 0;
}

#contenu p {
	padding:3px;
}

#contenu p.disabled {
	font-style:italic;
	color:lightgrey;
}

#contenu textarea {
	width:100%;
	display:block;
	margin:5px 0;
}

/*#contenu p:not(.disabled):hover { */
#contenu p:hover {
	cursor : pointer; 
	border : 1px dashed grey; 
}

#contenu p.disabled:hover {
	cursor : not-allowed; 
	border : none !important; 
}

</style>
<script>

	var cache = {
		apiRoot :  "http://tomnab.fr/paragraphes-api/api/",
		hash:"1acc0a40ce24bd86a21231abf6a9ae47",
		idArticle:1289
	};

	var jComposantP = $("<p>")
									// .css({"background-color":"lightgrey"})
									.click(function(){
			console.log("click " + $(this).html());
	});
	
	// lors du click sur un P. dans #contenu 
	// (même s'il n'existe pas encore !)
	//$(document).on("click", "#contenu p:not(.disabled)", function(){
	$(document).on("click", "#contenu p", function(){
	
		// s'il est désactivé, on ne fait rien 
		if ($(this).hasClass("disabled")) return; 
	
		console.log("click(on) " + $(this).html());
		var contenu = $(this).html(); 
		var jCloneTA = jComposantTA.clone(true); 
		var metaP = $(this).data(); 
		jCloneTA
			.val(contenu)
			.data(metaP); 
			
		$(this).replaceWith(jCloneTA); 
	});
	
	var jComposantAdd = $("<div>")
		.append($('<input type="text">'))
		.append(
			$('<input type="button">')
				.val("+")
				.click(function(){	// click btn +
					console.log("click +");
					
					// 1) ajouter le paragraphe côté client 
					var contenu = $(this).prev().val(); 
					if (contenu == "") contenu = "Nouveau";
					
					var jP = jComposantP
										.clone(true)
										.html(contenu)
										.addClass("disabled");
					
					if($("input[value='+']").index($(this)) == 0) {			 
						$("#contenu").prepend(jP);  // en haut
					} else {		
						$("#contenu").append(jP); // en bas 
					}
					
					// 2) envoyer une requete API pour le créer côté serveur 
					$.ajax({
						type: "POST",
						url: cache.apiRoot + "/articles/" + cache.idArticle + "/paragraphes",
						headers: {hash: cache.hashL},
						data: {"contenu":contenu},
						dataType: "json",
						success: function(oRep){
							console.log(oRep);
							
							// dans le scope de cette fonction, 
							// se trouvent toutes les variables locales 
							// de la fonction gestionnaire de click
							// notamment, jP !  
							
							jP.data(oRep.paragraphe);
							// jP.removeClass("disabled");
							
							/*
							{
    "version": 1.3,
    "success": true,
    "status": 201,
    "apiname": "paragraphes",
    "paragraphe": {
        "id": "8964",
        "contenu": "contenu",
        "ordre": "0"
    }
}
							*/
						},
						error : function (oRep){
							alert("Une erreur s'est produite, réactualiser le navigateur");
						},
					}); // fin ajax POST /paragraphes
					
					
				}) // fin click btn +
		)
		.css("display","inline")
		.addClass("controle");


	// affichage des data si elles existent 
	$(document).on("mouseover","#contenu *",function(){
	
		var meta = $(this).data();
		if (! $.isEmptyObject(meta))
			console.log(meta);
	
	});
	
	// quand le document est prêt //////////////////////
	$(document).ready(function(){
	
		// click sur bouton cacher : bascule visibilité des P. 
		$("[value='Cacher']").click(function(){

			// 1) bascule de l'état de visibilité du contenu 
			// ==> il suffit de recopier le code de la fonction toggle ici ! 
			$("#contenu").toggle(); 
			$(".controle").toggle(); 
			
			if ($("input[value='Cacher']").length )
				$("input[value='Cacher']").val("Afficher");
			else 
				$("input[value='Afficher']").val("Cacher");
			
			// 3) controler aussi la visibilité des input d'ajout 2 x (text/btn+)
			
		});
	
		// insertion des boutons d'ajout après chaque bouton cacher 
		$("[value='Cacher']").after(jComposantAdd.clone(true));
		
		// recup. paragraphes ///////////////////////////////
		// simple requete GET qui reçoit du JSON 
		// $.getJSON() 
		// GET JSON sur http://tomnab.fr/paragraphes-api/api/
		$.getJSON(
			cache.apiRoot + "/articles/" + cache.idArticle + "/paragraphes", 
			{ hash: cache.hash},
			function (oRepJson){
				console.log(oRepJson);
				
				for(var i=0;i<oRepJson.paragraphes.length;i++) {
					var jP = jComposantP
										.clone(true)
										.html(oRepJson.paragraphes[i].contenu)
										.data(oRepJson.paragraphes[i]);
										
						$("#contenu").append(jP);

				}
			} // fin success getJSON
		); // fin  recup. paragraphes //////////////////////
		
	}); // fin ready //////////////////////

	
	var jComposantTA = $("<textarea>")
		.keydown(function(contexte){	
			// NB : un contexte est TOUJOURS PASSE aux gestionnaires d'evnt jquery
			if (contexte.key != "Enter") return; 
			
			var contenu = $(this).val();
			var metaTA = $(this).data();
			 
			var jCloneP = jComposantP
											.clone(true)
											.html(contenu)
											.data(metaTA)
											.addClass("disabled");
																						
			$.ajax({
						type: "PUT",
						url: cache.apiRoot + "/articles/" + cache.idArticle + "/paragraphes/" + metaTA.id + "?contenu=" + contenu ,
						headers: {hash: cache.hash},
						// data: {"contenu":contenu}, // pas dans des methodes PUT !!
						dataType: "json",
						success: function(oRep){
							console.log(oRep);
							
							// réintégrer les méta-données de la réponse 
							// dans le P. côté client 
							jCloneP.data(oRep.paragraphe); 
							jCloneP.removeClass("disabled");
						},
						error : function (oRep){
							alert("Une erreur s'est produite, réactualiser le navigateur");
						},
					}); // fin ajax PUT /paragraphes
					
											
			$(this).replaceWith(jCloneP);
		
	});
	
	$(document).on("keydown", function(lecontexte){
		if (lecontexte.key == "Escape") {
			// il faut annuler les éditions en cours 
	
			$("#contenu textarea").each(function(){

				var metaTA = $(this).data(); 
				
				var jCloneP = jComposantP
												.clone(true)
												.html(metaTA.contenu)
												.data(metaTA);
												
				$(this).replaceWith(jCloneP);
				
			});
			
			 
		}
	
	}); 
	
// TODO : mettre en place le mode édition : 
// 1) affecter au textarea les  méta données du P. cliqué en cours d'édition 
// 2) lors de l'appui sur ENTREE 
// 		- restaurer le P avec son nouveau contenu ET ses anciennes méta-données 
// 				en mode désactivé
//		- déclencher une requete PUT pour mettre à jour coté serveur
//			ATTENTION à la manière d'envoyer les données (pas de .data())
// 		- quand le serveur acquitte la mise à jour , on supprime le mode désactivé du paragraphe
// 3) traiter l'annulation par ESCAPE 


	
</script>

<body >

	<input type="button"  value="Cacher"/>
	<br />
	
	<div id="contenu">
	</div>

	<input type="button" value="Cacher"/>
	
</body>
</html>
